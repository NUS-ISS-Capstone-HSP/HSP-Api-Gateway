name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

  build_and_push_image:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image name
        id: image_meta
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          REPO_NAME="${REPO_NAME,,}"
          IMAGE_BASE="${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/${REPO_NAME}"

          echo "repo_name=${REPO_NAME}" >> "${GITHUB_OUTPUT}"
          echo "image_base=${IMAGE_BASE}" >> "${GITHUB_OUTPUT}"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate registry secrets
        env:
          ALIYUN_REGISTRY: ${{ secrets.ALIYUN_REGISTRY }}
          ALIYUN_NAMESPACE: ${{ secrets.ALIYUN_NAMESPACE }}
          ALIYUN_USERNAME: ${{ secrets.ALIYUN_USERNAME }}
          ALIYUN_PASSWORD: ${{ secrets.ALIYUN_PASSWORD }}
        run: |
          test -n "${ALIYUN_REGISTRY}" || { echo "ALIYUN_REGISTRY is empty"; exit 1; }
          test -n "${ALIYUN_NAMESPACE}" || { echo "ALIYUN_NAMESPACE is empty"; exit 1; }
          test -n "${ALIYUN_USERNAME}" || { echo "ALIYUN_USERNAME is empty"; exit 1; }
          test -n "${ALIYUN_PASSWORD}" || { echo "ALIYUN_PASSWORD is empty"; exit 1; }

      - name: Login to Aliyun registry
        run: |
          echo "${{ secrets.ALIYUN_PASSWORD }}" | docker login "${{ secrets.ALIYUN_REGISTRY }}" \
            --username "${{ secrets.ALIYUN_USERNAME }}" \
            --password-stdin

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image_meta.outputs.image_base }}:${{ github.sha }}
            ${{ steps.image_meta.outputs.image_base }}:latest
